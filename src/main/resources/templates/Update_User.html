<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<title>User : Update</title>
	<link rel="stylesheet" href="" th:href="@{/css/Update_User.css}" />
</head>
<body>
	<a href="/admin/services"> Back to Services</a>
	<div class="updateUser">
		<h3 style="color: red;"> UPDATE EXISTING USER/CUSTOMER </h3>
		<form action="" th:action="@{'/updatingUser/'+${user.id}}" th:object="${user}" method="post">
			User_Name :
			<input type="text" name="uname" th:value="${user.uname}" required minlength="2" maxlength="50" />
			User_Email :
			<input type="email" name="uemail" th:value="${user.uemail}" required />
			User_Number :
			<input type="tel" name="unumber" th:value="${user.unumber}" pattern="\d{10,15}" required />

			<button type="submit">Update_User</button>
		</form>
	</div>
</body>
</html>
