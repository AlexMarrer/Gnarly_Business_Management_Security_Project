<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<title>Admin : Update</title>
	<link rel="stylesheet" href="" th:href="@{/css/Update_Admin.css}" />
</head>
<body>
	<a href="/admin/services">Back to Services</a>
	<div class="updateAdmin">
		<h3 style="color: red;">UPDATE EXISTING ADMIN / PARTNER DETAILS</h3>
		<form action="" th:action="@{'/updatingAdmin/'+${admin.id}}" th:object="${admin}" method="post">
			Admin_Name :
			<input type="text" name="adminName" th:value="${admin.adminName}" required minlength="2" maxlength="50" /><br />
			Admin_Number :
			<input type="tel" name="adminNumber" th:value="${admin.adminNumber}" pattern="\d{10,15}" required /> <br />
			Admin_Email :
			<input type="email" name="adminEmail" th:value="${admin.adminEmail}" required /> <br />

			<button type="submit">Update_Admin</button>
		</form>
	</div>
</body>
</html>
