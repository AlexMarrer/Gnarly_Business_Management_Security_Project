<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<title>TEA : LOGIN</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
	<link rel="stylesheet" href="" th:href="@{/css/Navigation.css}" />
	<link rel="stylesheet" href="" th:href="@{/css/Login.css}" />
</head>

<body>
	<nav th:replace="~{Navigation::navbar()}">
	</nav>
	<div class="LoginContainer">
		<div class="admin">
			<div class="content">
				<strong style="font-size: 16px;margin-bottom: 0px;">BUSINESS</strong>
				<h2>Login</h2>

				<form th:action="@{/login}" method="post">
					<b>Email :</b>
					<input type="email" name="email" placeholder="Enter email..." class="email" required> <br />

					<b> Password:</b>
					<input type="password" name="password" placeholder="Enter password" class="password"
						required minlength="8">

					<div th:if="${param.error}" style="color: red; margin-top: 5px;">
						Benutzername oder Passwort falsch.
					</div>
					<div th:if="${param.locked}" style="color: red; margin-top: 5px;">
						Account gesperrt nach zu vielen Fehlversuchen.
					</div>
					<div th:if="${param.logout}" style="color: green; margin-top: 5px;">
						Erfolgreich abgemeldet.
					</div>
					<br />
					<button type="submit" class="loginButton">Log in</button>
				</form>
			</div>
		</div>
	</div>
</body>

</html>
