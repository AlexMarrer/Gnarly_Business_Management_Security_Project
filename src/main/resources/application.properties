spring.datasource.name=businessproject
spring.datasource.url=jdbc:mysql://localhost:3306/businessproject
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.jakarta.persistence.validation.mode=none
server.port=2330

# Pepper for password hashing (override via env variable PEPPER_SECRET in production!)
app.security.pepper=${PEPPER_SECRET:bitte-aendern-in-produktion}

# Initial admin credentials (override via env variables in production)
app.admin.email=${ADMIN_EMAIL:admin@business.com}
app.admin.password=${ADMIN_PASSWORD:Admin123!}
app.admin.number=${ADMIN_NUMBER:0000000000}

# Session management
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=Lax
