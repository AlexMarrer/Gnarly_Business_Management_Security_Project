spring.datasource.name=businessproject
spring.datasource.url=jdbc:mysql://localhost:3306/businessproject
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
server.port=2330

# Pepper for password hashing (override via env variable PEPPER_SECRET in production!)
app.security.pepper=${PEPPER_SECRET:bitte-aendern-in-produktion}

# Session management
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=Lax
